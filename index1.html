<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Klasemen Turnamen Slot - Piala Dunia 2026</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        @media (min-width: 768px) {
            .desktop-btn-large {
                padding: 15px 40px !important;
                font-size: 20px !important;
                min-width: 250px !important;
                margin: 15px auto !important;
                display: block;
            }
        }
        body{
            background:#111;
            color:white;
            font-family:Segoe UI;
        }
        .carousel-item img {
            width: 100%;
            height: auto;
            max-width: 800px;
            margin: 0 auto;
            aspect-ratio: 1 / 1;
            object-fit: cover;
            border-radius: 10px;
        }
        .carousel {
            max-width: 800px;
            margin: 20px auto;
        }
        .container-box{
            max-width:1000px;
            margin:auto;
            padding:20px;
        }
        .title{
            text-align:center;
            font-size:20px;
            font-weight:bold;
            color:#ffc107;
            margin-bottom:30px;
        }
        .search-section{
            display:none;
            background:#222;
            padding:20px;
            border-radius:15px;
            margin-top:30px;
        }
        .search-box{
            background:#333;
            padding:20px;
            border-radius:10px;
            margin-bottom:20px;
            text-align: left;
        }
        .result-box{
            margin-top:15px;
            padding:15px;
            background:#444;
            border-radius:10px;
            display:none;
        }
        .result-item{
            padding:10px 0;
            border-bottom:1px solid #666;
        }
        .result-item:last-child {
            border-bottom: none;
        }
        .result-item span{
            color:#ffc107;
            font-weight:bold;
        }
        /* Custom Dropdown Styling */
        .main-dropdown-btn {
            background: linear-gradient(45deg, #FFD91A, #FFB300);
            color: black;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            padding: 12px 24px;
            font-size: 16px;
            transition: 0.3s;
            width: 100%;
            max-width: 350px;
            margin: 0 auto;
        }
        .main-dropdown-btn:hover {
            transform: scale(1.05);
        }
        .dropdown-menu {
            background-color: #333;
            border: 1px solid #444;
            border-radius: 10px;
            text-align: center;
        }
        .dropdown-item {
            color: white;
            font-weight: bold;
            padding: 12px;
            transition: 0.2s;
        }
        .dropdown-item:hover {
            background-color: #444;
            color: #ffc107;
        }
        
        /* History Section */
        .history-section {
            background: #222;
            padding: 30px;
            border-radius: 15px;
            margin-top: 10px;
            margin-bottom: 20px;
            border: 1px solid #444;
        }
        .history-title {
            color: #ffc107;
            text-align: center;
            font-weight: bold;
            margin-bottom: 25px;
            font-size: 15px;
            letter-spacing: 1px;
        }
        .history-card {
            background: #333;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 15px;
            border-left: 5px solid #ffc107; 
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: 0.3s;
        }
        .history-card:hover {
            background: #444;
            transform: translateX(5px);
        }
        .history-card.play-theme {
            border-left: 5px solid #001AFF; 
        }
        .history-info h5 {
            margin: 0 0 5px 0;
            color: white;
            font-weight: bold;
            font-size: 16px;
        }
        .history-info p {
            margin: 0;
            color: #aaa;
            font-size: 13px;
        }
        .history-prize {
            font-size: 18px;
            font-weight: bold;
            color: #28a745; 
            background: rgba(40, 167, 69, 0.1);
            padding: 5px 10px;
            border-radius: 8px;
        }
    </style>
</head>

<body>

<div class="container-box">
    <div class="title">
        🏆 KLASEMEN TURNAMEN SLOT
    </div>

    <!-- Carousel Banner -->
    <div id="promoCarousel" class="carousel slide" data-bs-ride="carousel">
        <div class="carousel-inner">
            <div class="carousel-item active">
                <img src="/assets/TURNAMEN-SLOT-303GROUP.png" alt="Slide 1">
            </div>
            <div class="carousel-item">
                <a href="https://cutt.ly/pools303gacor">
                    <img src="/assets/Pools303-Terbaik.png" alt="Slide 2">
                </a>
            </div>
            <div class="carousel-item">
                <a href="https://cutt.ly/play303gacor">
                    <img src="/assets/Play303-Terpercaya.png" alt="Slide 3">
                </a>
            </div>
        </div>
        <button class="carousel-control-prev" type="button" data-bs-target="#promoCarousel" data-bs-slide="prev">
            <span class="carousel-control-prev-icon" aria-hidden="true"></span>
            <span class="visually-hidden">Sebelumnya</span>
        </button>
        <button class="carousel-control-next" type="button" data-bs-target="#promoCarousel" data-bs-slide="next">
            <span class="carousel-control-next-icon" aria-hidden="true"></span>
            <span class="visually-hidden">Berikutnya</span>
        </button>
    </div>

    <!-- Dropdown Menu Event Piala Dunia -->
    <div class="text-center mt-4">
        <div class="dropdown">
            <button class="btn main-dropdown-btn desktop-btn-large dropdown-toggle" type="button" id="dropdownEvent" data-bs-toggle="dropdown" aria-expanded="false">
                EVENT PIALA DUNIA 2026
            </button>
            <ul class="dropdown-menu w-100" style="max-width: 350px; margin: 0 auto;" aria-labelledby="dropdownEvent">
                <li><a class="dropdown-item text-danger" href="#" onclick="showSection('agent')">AGENT303</a></li>
                <li><a class="dropdown-item text-primary" href="#" onclick="showSection('play')">PLAY303</a></li>
                <li><a class="dropdown-item text-warning" href="#" onclick="showSection('pools')">POOLS303</a></li>
            </ul>
        </div>
    </div>

    <!-- SECTION AGENT303 -->
    <div id="agent-section" class="search-section">
        <h2 class="text-white text-center mb-4">AGENT303</h2>
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="search-box">
                    <h4 class="text-danger mb-3 text-center">Cek Klasemen</h4>
                    <div class="mb-3">
                        <label class="text-white-50 small mb-1">UserID</label>
                        <input type="text" id="agent-userid-input" class="form-control" placeholder="Masukkan UserID">
                    </div>
                    <div class="mb-3">
                        <label class="text-white-50 small mb-1">Nama</label>
                        <input type="text" id="agent-name-input" class="form-control" placeholder="Masukkan Nama Terdaftar">
                    </div>
                    <button class="btn btn-danger w-100 fw-bold" onclick="searchAgentData('AGENT303', 'agent-userid-input', 'agent-name-input', 'agent-result')">CARI DATA</button>
                    <div id="agent-result" class="result-box"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- SECTION PLAY303 -->
    <div id="play-section" class="search-section">
        <h2 class="text-primary text-center mb-4">PIALA DUNIA 2026 - PLAY303</h2>
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="search-box border-primary" style="border-top: 4px solid #001AFF;">
                    <h4 class="text-white mb-3 text-center">Cari Username</h4>
                    <div class="input-group mb-3">
                        <input type="text" id="play-username-input" class="form-control" placeholder="Masukkan Username Anda">
                        <button class="btn btn-primary fw-bold" onclick="searchData('PLAY303', 'play-username-input', 'play-result')">CARI</button>
                    </div>
                    <div id="play-result" class="result-box"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- SECTION POOLS303 -->
    <div id="pools-section" class="search-section">
        <h2 class="text-warning text-center mb-4">PIALA DUNIA 2026 - POOLS303</h2>
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="search-box border-warning" style="border-top: 4px solid #ffc107;">
                    <h4 class="text-white mb-3 text-center">Cari Username</h4>
                    <div class="input-group mb-3">
                        <input type="text" id="pools-username-input" class="form-control" placeholder="Masukkan Username Anda">
                        <button class="btn btn-warning fw-bold text-dark" onclick="searchData('POOLS303', 'pools-username-input', 'pools-result')">CARI</button>
                    </div>
                    <div id="pools-result" class="result-box"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- HISTORY SECTION (OPSIONAL, BISA DIHAPUS JIKA TIDAK PERLU) -->
    <div class="history-section mt-5">
        <div class="history-title">
            📜 RIWAYAT JUARA SEBELUMNYA
        </div>
        <div class="text-center mb-4" id="history-action-container">
            <button id="btn-load-history" class="btn btn-outline-warning fw-bold px-4 py-2" onclick="initHistoryData()">
                Muat Riwayat Juara 🔄
            </button>
        </div>
        <div id="history-status" class="text-center mb-3"></div>
        <div class="row" id="history-data-container" style="display:none;">
            <!-- Placeholder for history rendering -->
        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    /*
    ==========================================
    SHOW SECTION TABS
    ==========================================
    */
    function showSection(section){
        document.getElementById('agent-section').style.display='none';
        document.getElementById('play-section').style.display='none';
        document.getElementById('pools-section').style.display='none';
        
        document.getElementById(section + '-section').style.display='block';
    }

    /*
    ==========================================
    SEARCH DATA (POOLS303 & PLAY303)
    ==========================================
    */
    async function searchData(sheetName, inputId, resultId) {
        const username = document.getElementById(inputId).value.trim().toLowerCase();
        const resultBox = document.getElementById(resultId);

        if(!username){
            resultBox.style.display='block';
            resultBox.innerHTML=`<span class="text-danger">Silakan masukkan username.</span>`;
            return;
        }

        resultBox.style.display='block';
        resultBox.innerHTML=`<span class="text-light">Sedang mencari data... ⏳</span>`;

        try {
            const url = `/api/search?sheet=${encodeURIComponent(sheetName)}`;
            const response = await fetch(url);

            if (!response.ok) throw new Error(`Server Error: ${response.status}`);

            const data = await response.json();
            const rows = data.values;

            if(data.error || !rows){
                resultBox.innerHTML=`<span class="text-danger">Data sheet kosong atau parameter salah.</span>`;
                return;
            }

            let found = false;
            rows.forEach((row, index) => {
                if(index === 0) return; // Skip header

                const rank = row[0] || '-';
                const user = row[1] || '-';
                const turnover = row[2] || '-';

                if(user.toString().toLowerCase() === username){
                    found = true;
                    resultBox.innerHTML=`
                        <div class="result-item">Ranking: <span>${rank}</span></div>
                        <div class="result-item">Username: <span class="text-white">${user}</span></div>
                        <div class="result-item border-0">Turnover: <span class="text-success">${turnover}</span></div>
                    `;
                }
            });

            if(!found){
                resultBox.innerHTML=`<span class="text-warning">Username tidak ditemukan.</span>`;
            }

        } catch(error) {
            resultBox.innerHTML=`
                <span class="text-danger">
                    Gagal menghubungi server database.<br>
                    <small>${error.message}</small>
                </span>
            `;
        }
    }

    /*
    ==========================================
    SEARCH DATA KHUSUS AGENT303 (2 INPUT)
    ==========================================
    */
    async function searchAgentData(sheetName, userIdInputId, nameInputId, resultId) {
        const userId = document.getElementById(userIdInputId).value.trim().toLowerCase();
        const nameData = document.getElementById(nameInputId).value.trim().toLowerCase();
        const resultBox = document.getElementById(resultId);

        if(!userId || !nameData){
            resultBox.style.display='block';
            resultBox.innerHTML=`<span class="text-danger">⚠️ Harap masukkan UserID dan Nama dengan lengkap!</span>`;
            return;
        }

        resultBox.style.display='block';
        resultBox.innerHTML=`<span class="text-light">Sedang mencari data... ⏳</span>`;

        try {
            const url = `/api/search?sheet=${encodeURIComponent(sheetName)}`;
            const response = await fetch(url);

            if (!response.ok) throw new Error(`Server Error: ${response.status}`);
            
            const data = await response.json();
            const rows = data.values;

            if(data.error || !rows){
                resultBox.innerHTML=`<span class="text-danger">Data sheet kosong.</span>`;
                return;
            }

            let found = false;
            
            rows.forEach((row, index) => {
                if(index === 0) return; 

                // Asumsi indeks kolom: 0=Rank, 1=UserID, 2=Name, 3=Turnover
                const rank = row[0] || '-';
                const sheetUserId = (row[1] || '').toString().toLowerCase();
                const sheetNameVal = (row[2] || '').toString().toLowerCase();
                const turnover = row[3] || '-';

                if(sheetUserId === userId && sheetNameVal === nameData){
                    found = true;
                    resultBox.innerHTML=`
                        <div class="result-item">Ranking: <span>${rank}</span></div>
                        <div class="result-item">UserID: <span class="text-white">${row[1]}</span></div>
                        <div class="result-item">Name: <span class="text-white">${row[2]}</span></div>
                        <div class="result-item border-0">Turnover: <span class="text-success">${turnover}</span></div>
                    `;
                }
            });

            if(!found){
                resultBox.innerHTML=`<span class="text-warning">❌ Data tidak ditemukan. Pastikan UserID dan Nama sudah benar.</span>`;
            }

        } catch(error) {
            resultBox.innerHTML=`<span class="text-danger">Gagal menghubungi server.<br><small>${error.message}</small></span>`;
        }
    }

    /*
    ==========================================
    HISTORY LOGIC (Sesuai script asli - dummy)
    ==========================================
    */
    async function initHistoryData() {
        const statusBox = document.getElementById('history-status');
        const btnLoad = document.getElementById('btn-load-history');
        if(btnLoad) {
            btnLoad.disabled = true;
            btnLoad.innerHTML = 'Memuat Data... ⏳';
        }
        statusBox.innerHTML = `<span class="text-info">Menghubungkan ke Database Server... ⏳</span>`;
        
        try {
            const url = `/api/history`; 
            const response = await fetch(url);
            if (!response.ok) throw new Error(`Server Error: ${response.status}`);
            const data = await response.json();
            // ... Logic render ...
            statusBox.innerHTML = '<span class="text-success">Data berhasil dimuat (Simulasi).</span>';
        } catch (error) {
            statusBox.innerHTML = `<span class="text-danger">Gagal memuat database riwayat:<br><small>${error.message}</small></span>`;
            if(btnLoad) {
                btnLoad.disabled = false;
                btnLoad.innerHTML = 'Coba Lagi 🔄';
            }
        }
    }
</script>

</body>
</html>
