<!DOCTYPE html>
<html lang="id">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Klasemen Turnamen Slot</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <style>

        body{
            background:#111;
            color:white;
            font-family:Segoe UI;
        }
        /* Pengaturan ukuran gambar slider 800x800 */
        .carousel-item img {
            width: 100%;
            height: auto;
            max-width: 800px;
            margin: 0 auto;
            aspect-ratio: 1 / 1;
            object-fit: cover;
            border-radius: 10px;
        }
        .carousel {
            max-width: 800px;
            margin: 20px auto;
        }
        .container-box{
            max-width:1000px;
            margin:auto;
            padding:20px;
        }

        .title{
            text-align:center;
            font-size:40px;
            font-weight:bold;
            color:#ffc107;
            margin-bottom:30px;
        }

        .main-btn{
            padding:15px 25px;
            border:none;
            border-radius:50px;
            font-size:18px;
            font-weight:bold;
            margin:10px;
            transition:0.3s;
            min-width: 280px;
        }

        .main-btn:hover{
            transform:scale(1.05);
        }

        .btn-pools{
            background:linear-gradient(45deg,#FFD91A,#FFB300);
            color:black;
        }

        .btn-play{
            background:linear-gradient(45deg,#001AFF,#003CFF);
            color:white;
        }

        .search-section{
            display:none;
            background:#222;
            padding:20px;
            border-radius:15px;
            margin-top:30px;
        }

        .search-box{
            background:#333;
            padding:20px;
            border-radius:10px;
            margin-bottom:20px;
        }

        .result-box{
            margin-top:15px;
            padding:15px;
            background:#444;
            border-radius:10px;
            display:none;
        }

        .result-item{
            padding:10px 0;
            border-bottom:1px solid #666;
        }

        .result-item span{
            color:#ffc107;
            font-weight:bold;
        }

        /* ==========================================
           TAMBAHAN: CSS HISTORY JUARA
           ========================================== */
        .history-section {
            background: #222;
            padding: 30px;
            border-radius: 15px;
            margin-top: 40px;
            margin-bottom: 20px;
            border: 1px solid #444;
        }

        .history-title {
            color: #ffc107;
            text-align: center;
            font-weight: bold;
            margin-bottom: 25px;
            font-size: 28px;
            letter-spacing: 1px;
        }

        .history-card {
            background: #333;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 15px;
            border-left: 5px solid #ffc107; /* Aksen Emas untuk Pools */
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: 0.3s;
        }

        .history-card:hover {
            background: #444;
            transform: translateX(5px);
        }

        .history-card.play-theme {
            border-left: 5px solid #001AFF; /* Aksen Biru untuk Play */
        }

        .history-info h5 {
            margin: 0 0 5px 0;
            color: white;
            font-weight: bold;
            font-size: 16px;
        }

        .history-info p {
            margin: 0;
            color: #aaa;
            font-size: 13px;
        }

        .history-prize {
            font-size: 18px;
            font-weight: bold;
            color: #28a745; /* Warna hijau untuk hadiah */
            background: rgba(40, 167, 69, 0.1);
            padding: 5px 10px;
            border-radius: 8px;
        }

    </style>

</head>

<body>

<div class="container-box">

    <div class="title">
        🏆 KLASEMEN TURNAMEN SLOT
    </div>

	<div id="promoCarousel" class="carousel slide" data-bs-ride="carousel">
        <div class="carousel-inner">
            <div class="carousel-item active">
                <img src="https://placehold.co/800x800?text=Banner1" alt="Slide 1">
            </div>
            <div class="carousel-item">
                <img src="https://placehold.co/800x800?text=Banner2" alt="Slide 2">
            </div>
            <div class="carousel-item">
                <img src="https://placehold.co/800x800?text=Banner3" alt="Slide 3">
            </div>
            <div class="carousel-item">
                <img src="https://placehold.co/800x800?text=Banner4" alt="Slide 4">
            </div>
        </div>
        <button class="carousel-control-prev" type="button" data-bs-target="#promoCarousel" data-bs-slide="prev">
            <span class="carousel-control-prev-icon" aria-hidden="true"></span>
            <span class="visually-hidden">Sebelumnya</span>
        </button>
        <button class="carousel-control-next" type="button" data-bs-target="#promoCarousel" data-bs-slide="next">
            <span class="carousel-control-next-icon" aria-hidden="true"></span>
            <span class="visually-hidden">Berikutnya</span>
        </button>
    </div>


    <div class="text-center">

        <button
            class="main-btn btn-pools"
            onclick="showSection('pools')">

            KLASEMEN POOLS303

        </button>

        <button
            class="main-btn btn-play"
            onclick="showSection('play')">

            KLASEMEN PLAY303

        </button>

    </div>

    <!-- POOLS -->

    <div id="pools-section"
        class="search-section">

        <h2 class="text-center text-white mb-4">
            POOLS303
        </h2>

        <div class="row">

            <div class="col-md-6">

                <div class="search-box">

                    <h4 class="text-white">
                        PG SOFT
                    </h4>

                    <div class="input-group">

                        <input
                            type="text"
                            id="pools-pg-input"
                            class="form-control"
                            placeholder="Masukkan Username">

                        <button
                            class="btn btn-primary"
                            onclick="searchData(
                                'PG SOFT POOLS303',
                                'pools-pg-input',
                                'pools-pg-result'
                            )">

                            Cari

                        </button>

                    </div>

                    <div
                        id="pools-pg-result"
                        class="result-box">
                    </div>

                </div>

            </div>

            <div class="col-md-6">

                <div class="search-box">

                    <h4 class="text-warning">
                        PRAGMATIC
                    </h4>

                    <div class="input-group">

                        <input
                            type="text"
                            id="pools-prag-input"
                            class="form-control"
                            placeholder="Masukkan Username">

                        <button
                            class="btn btn-warning"
                            onclick="searchData(
                                'PRAGMATIC POOLS303',
                                'pools-prag-input',
                                'pools-prag-result'
                            )">

                            Cari

                        </button>

                    </div>

                    <div
                        id="pools-prag-result"
                        class="result-box">
                    </div>

                </div>

            </div>

        </div>

    </div>

    <!-- PLAY -->

    <div id="play-section"
        class="search-section">

        <h2 class="text-white text-center mb-4">
            PLAY303
        </h2>

        <div class="row">

            <div class="col-md-6">

                <div class="search-box">

                    <h4 class="text-white">
                        PG SOFT
                    </h4>

                    <div class="input-group">

                        <input
                            type="text"
                            id="play-pg-input"
                            class="form-control"
                            placeholder="Masukkan Username">

                        <button
                            class="btn btn-primary"
                            onclick="searchData(
                                'PG SOFT PLAY303',
                                'play-pg-input',
                                'play-pg-result'
                            )">

                            Cari

                        </button>

                    </div>

                    <div
                        id="play-pg-result"
                        class="result-box">
                    </div>

                </div>

            </div>

            <div class="col-md-6">

                <div class="search-box">

                    <h4 class="text-warning">
                        PRAGMATIC
                    </h4>

                    <div class="input-group">

                        <input
                            type="text"
                            id="play-prag-input"
                            class="form-control"
                            placeholder="Masukkan Username">

                        <button
                            class="btn btn-warning"
                            onclick="searchData(
                                'PRAGMATIC PLAY303',
                                'play-prag-input',
                                'play-prag-result'
                            )">

                            Cari

                        </button>

                    </div>

                    <div
                        id="play-prag-result"
                        class="result-box">
                    </div>

                </div>

            </div>

        </div>

    </div>

    <div class="history-section">
        <div class="history-title">
            📜 RIWAYAT JUARA SEBELUMNYA
        </div>

        <div class="row justify-content-center mb-4">
            <div class="col-md-4 mb-2">
                <div class="input-group">
                    <label class="input-group-text bg-dark text-white border-secondary" for="filterBulan">Bulan</label>
                    <select class="form-select bg-dark text-warning border-secondary" id="filterBulan" onchange="renderHistory()">
                        <option value="April 2026">April 2026</option>
                        <option value="Mei 2026">Mei 2026</option>
                    </select>
                </div>
            </div>
            <div class="col-md-4 mb-2">
                <div class="input-group">
                    <label class="input-group-text bg-dark text-white border-secondary" for="filterSitus">Situs</label>
                    <select class="form-select bg-dark text-warning border-secondary" id="filterSitus" onchange="renderHistory()">
                        <option value="SEMUA">Semua Situs</option>
                        <option value="POOLS303">POOLS303</option>
                        <option value="PLAY303">PLAY303</option>
                    </select>
                </div>
            </div>
            <div class="col-md-4 mb-2">
                <div class="input-group">
                    <label class="input-group-text bg-dark text-white border-secondary" for="filterProvider">Provider</label>
                    <select class="form-select bg-dark text-warning border-secondary" id="filterProvider" onchange="renderHistory()">
                        <option value="SEMUA">Semua Provider</option>
                        <option value="PG SOFT">PG Soft</option>
                        <option value="PRAGMATIC">Pragmatic</option>
                    </select>
                </div>
            </div>
        </div>

        <div id="history-status" class="text-center mb-3"></div>

        <div class="row">
            <div class="col-md-6 mb-4" id="box-pools-pg">
                <h5 class="text-warning text-center mb-3 fw-bold border-bottom border-warning pb-2">🏆 POOLS303 - PG SOFT</h5>
                <div id="data-pools-pg"></div>
            </div>

            <div class="col-md-6 mb-4" id="box-pools-prag">
                <h5 class="text-warning text-center mb-3 fw-bold border-bottom border-warning pb-2">🏆 POOLS303 - PRAGMATIC</h5>
                <div id="data-pools-prag"></div>
            </div>

            <div class="col-md-6 mb-4" id="box-play-pg">
                <h5 class="text-primary text-center mb-3 fw-bold border-bottom border-primary pb-2">🏆 PLAY303 - PG SOFT</h5>
                <div id="data-play-pg"></div>
            </div>

            <div class="col-md-6 mb-4" id="box-play-prag">
                <h5 class="text-primary text-center mb-3 fw-bold border-bottom border-primary pb-2">🏆 PLAY303 - PRAGMATIC</h5>
                <div id="data-play-prag"></div>
            </div>
        </div>
    </div>

</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>

    /*
    ==========================================
    KREDENSIAL DIHAPUS (Dipindah ke Cloudflare)
    ==========================================
    */

    /*
    ==========================================
    SHOW SECTION
    ==========================================
    */
    function showSection(section){
        document.getElementById('pools-section').style.display='none';
        document.getElementById('play-section').style.display='none';
        document.getElementById(section + '-section').style.display='block';
    }

    /*
    ==========================================
    SEARCH DATA (VIA CLOUDFLARE PROXY) - PROTECTED
    ==========================================
    */
    async function searchData(sheetName, inputId, resultId) {
        const username = document.getElementById(inputId).value.trim().toLowerCase();
        const resultBox = document.getElementById(resultId);

        if(!username){
            resultBox.style.display='block';
            resultBox.innerHTML=`<span class="text-danger">Silakan masukkan username.</span>`;
            return;
        }

        resultBox.style.display='block';
        resultBox.innerHTML=`<span class="text-light">Sedang mencari data... ⏳</span>`;

        try {
            const url = `/api/search?sheet=${encodeURIComponent(sheetName)}`;
            const response = await fetch(url);

            // PROTEKSI 1: Cek status HTTP
            if (!response.ok) throw new Error(`Server Error: ${response.status}`);

            // PROTEKSI 2: Cek format respon server
            const contentType = response.headers.get("content-type");
            if (!contentType || !contentType.includes("application/json")) {
                throw new TypeError("Sistem menerima format HTML/Teks (kemungkinan fallback halaman lokal), bukan JSON.");
            }

            const data = await response.json();
            const rows = data.values;

            if(data.error || !rows){
                resultBox.innerHTML=`<span class="text-danger">Data sheet kosong atau parameter salah.</span>`;
                return;
            }

            let found = false;
            rows.forEach((row, index) => {
                if(index === 0) return; 

                const rank = row[0] || '-';
                const user = row[1] || '-';
                const turnover = row[2] || '-';

                if(user.toString().toLowerCase() === username){
                    found = true;
                    resultBox.innerHTML=`
                        <div class="result-item">Ranking: <span>${rank}</span></div>
                        <div class="result-item">Username: <span>${user}</span></div>
                        <div class="result-item border-0">Turnover: <span class="text-success">${turnover}</span></div>
                    `;
                }
            });

            if(!found){
                resultBox.innerHTML=`<span class="text-warning">Username tidak ditemukan.</span>`;
            }

        } catch(error) {
            console.error("Detail Error Pencarian:", error);
            resultBox.innerHTML=`
                <span class="text-danger">
                    Gagal menghubungi server database.<br>
                    <small>${error.message}</small>
                </span>
            `;
        }
    }
    

    /*
    ==========================================
    STATE MANAGEMENT & FILTER LOGIC
    ==========================================
    */
    
    // Variabel Global untuk menyimpan data mentah dari Google Sheets
    let cachedHistoryData = [];

    /*
    ==========================================
    FETCH HISTORY DATA - PROTECTED
    ==========================================
    */
    /*
    ==========================================
    FETCH HISTORY DATA - PROTECTED (WITH LOCAL MOCK)
    ==========================================
    */
    async function initHistoryData() {
        const statusBox = document.getElementById('history-status');
        statusBox.innerHTML = `<span class="text-info">Menghubungkan ke Database... ⏳</span>`;

        // DETEKSI LINGKUNGAN LOKAL YANG LEBIH AGRESIF
        const hostname = window.location.hostname;
        const isLocalHost = hostname === '127.0.0.1' || 
                            hostname === 'localhost' || 
                            window.location.protocol === 'file:' ||
                            hostname.startsWith('192.168.') || 
                            hostname.startsWith('10.') ||
                            !hostname; // Menangkap kasus akses file langsung

        if (isLocalHost) {
            console.log("🛠️ Mode Lokal Terdeteksi: Menggunakan Data Tiruan (Mock Data)");
            cachedHistoryData = [
                ["April 2026", "POOLS303", "PG SOFT", "1", "Lokal_Player1", "Rp 5.000.000"],
                ["April 2026", "POOLS303", "PRAGMATIC", "1", "Lokal_Player2", "Rp 3.000.000"],
                ["April 2026", "PLAY303", "PG SOFT", "1", "Lokal_Player3", "Rp 5.000.000"],
                ["April 2026", "PLAY303", "PRAGMATIC", "1", "Lokal_Player4", "Rp 3.000.000"],
                ["Mei 2026", "POOLS303", "PG SOFT", "1", "Lokal_Player5", "Rp 5.000.000"]
            ];
            statusBox.innerHTML = `<span class="text-warning small">Menampilkan data tiruan (Lokal).</span>`;
            renderHistory();
            return; // WAJIB ADA: Mencegah eksekusi kode ke bawah
        }

        // ... [KODE TRY CATCH FETCH TETAP SAMA SEPERTI SEBELUMNYA] ...
        try {
            const url = `/api/history`; 
            const response = await fetch(url);
            
            if (!response.ok) throw new Error(`Server Error: ${response.status}`);

            const contentType = response.headers.get("content-type");
            if (!contentType || !contentType.includes("application/json")) {
                throw new TypeError("Sistem menerima format HTML/Teks (kemungkinan fallback halaman lokal), bukan JSON.");
            }

            const data = await response.json();
            
            if (!data.values || data.values.length <= 1) {
                statusBox.innerHTML = `<span class="text-warning">Belum ada data di sheet HISTORY_JUARA.</span>`;
                return;
            }

            cachedHistoryData = data.values.slice(1);
            statusBox.innerHTML = ''; 

            renderHistory();

        } catch (error) {
            console.error("Detail Error History:", error);
            statusBox.innerHTML = `<span class="text-danger">Gagal memuat database riwayat:<br><small>${error.message}</small></span>`;
        }
    }

    // Fungsi 2: Filter dan Render Data ke Layar (Berjalan tanpa memanggil API lagi)
    function renderHistory() {
        // Ambil Nilai Filter Saat Ini
        const fBulan = document.getElementById('filterBulan').value;
        const fSitus = document.getElementById('filterSitus').value;
        const fProvider = document.getElementById('filterProvider').value;

        // Siapkan Wadah Data
        let poolsPgData = [];
        let poolsPragData = [];
        let playPgData = [];
        let playPragData = [];

        // Loop Data yang ada di Memori
        cachedHistoryData.forEach(row => {
            const [bulan, situs, provider, ranking, username, hadiah] = row;

            // Pastikan data diproses dengan huruf kapital agar kebal terhadap salah ketik di Excel
            const sBulan = (bulan || '').trim();
            const sSitus = (situs || '').trim().toUpperCase();
            const sProvider = (provider || '').trim().toUpperCase();

            // Aturan Filter Utama
            const matchBulan = sBulan === fBulan;
            const matchSitus = fSitus === 'SEMUA' || sSitus === fSitus;
            const matchProvider = fProvider === 'SEMUA' || sProvider === fProvider;

            if (matchBulan && matchSitus && matchProvider) {
                // Masukkan ke keranjang yang sesuai
                if (sSitus === 'POOLS303' && sProvider === 'PG SOFT') poolsPgData.push(row);
                if (sSitus === 'POOLS303' && sProvider === 'PRAGMATIC') poolsPragData.push(row);
                if (sSitus === 'PLAY303' && sProvider === 'PG SOFT') playPgData.push(row);
                if (sSitus === 'PLAY303' && sProvider === 'PRAGMATIC') playPragData.push(row);
            }
        });

        // Fungsi Helper untuk Cetak HTML (Maksimal 10 Record)
        const buildHTML = (dataArray, themeClass) => {
            if (dataArray.length === 0) return `<p class="text-center text-secondary">Tidak ada data.</p>`;
            
            // Potong array (limit) hanya mengambil index 0 sampai 9 (10 data teratas)
            const limitedData = dataArray.slice(0, 10);
            
            return limitedData.map(row => {
                const [bulan, situs, provider, ranking, username, hadiah] = row;
                return `
                    <div class="history-card ${themeClass}">
                        <div class="history-info">
                            <h5>${ranking}. ${username}</h5>
                            <p>${situs} | ${provider}</p>
                        </div>
                        <div class="history-prize">${hadiah}</div>
                    </div>
                `;
            }).join('');
        };

        // Eksekusi Cetak ke HTML
        document.getElementById('data-pools-pg').innerHTML = buildHTML(poolsPgData, '');
        document.getElementById('data-pools-prag').innerHTML = buildHTML(poolsPragData, '');
        document.getElementById('data-play-pg').innerHTML = buildHTML(playPgData, 'play-theme');
        document.getElementById('data-play-prag').innerHTML = buildHTML(playPragData, 'play-theme');

        // Logika Tampilan (Sembunyikan kotak jika Filter Situs/Provider mensyaratkan demikian)
        document.getElementById('box-pools-pg').style.display = (fSitus !== 'PLAY303' && fProvider !== 'PRAGMATIC') ? 'block' : 'none';
        document.getElementById('box-pools-prag').style.display = (fSitus !== 'PLAY303' && fProvider !== 'PG SOFT') ? 'block' : 'none';
        document.getElementById('box-play-pg').style.display = (fSitus !== 'POOLS303' && fProvider !== 'PRAGMATIC') ? 'block' : 'none';
        document.getElementById('box-play-prag').style.display = (fSitus !== 'POOLS303' && fProvider !== 'PG SOFT') ? 'block' : 'none';
    }

    // Ubah Event Listener DOMContentLoaded untuk memanggil initHistoryData (bukan loadHistoryData)
    document.addEventListener('DOMContentLoaded', () => {
        initHistoryData(); // Hanya dieksekusi 1x saat buka halaman
    });

</script>

</body>
</html>
